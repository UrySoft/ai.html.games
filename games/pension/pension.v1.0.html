<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Simulador Actuarial de Pensiones | Oriol Badia</title>
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&family=JetBrains+Mono:wght@400;700;800&display=swap');
        
        body { background-color: #020617; font-family: 'Inter', sans-serif; color: #f8fafc; margin: 0; padding: 0; }
        .font-mono { font-family: 'JetBrains Mono', monospace; }
        
        .panel { background: #0f172a; border: 1px solid #1e293b; border-radius: 0.75rem; box-shadow: 0 4px 6px -1px rgba(0,0,0,0.3); display: flex; flex-direction: column; }
        .panel-header { border-bottom: 1px solid #1e293b; padding: 0.75rem 1rem; background: rgba(15, 23, 42, 0.8); border-radius: 0.75rem 0.75rem 0 0; }
        
        /* Sliders */
        input[type=range] { -webkit-appearance: none; width: 100%; background: transparent; }
        input[type=range]:focus { outline: none; }
        input[type=range]::-webkit-slider-runnable-track { height: 4px; background: #334155; border-radius: 2px; }
        input[type=range]::-webkit-slider-thumb { 
            -webkit-appearance: none; height: 16px; width: 16px; border-radius: 50%; 
            background: #fff; margin-top: -6px; cursor: pointer; border: 2px solid #020617;
            box-shadow: 0 0 6px rgba(255,255,255,0.4); transition: transform 0.1s;
        }
        input[type=range]:active::-webkit-slider-thumb { transform: scale(1.2); }
        .slider-blue::-webkit-slider-thumb { background: #3b82f6; box-shadow: 0 0 8px #3b82f6; }
        .slider-orange::-webkit-slider-thumb { background: #f97316; box-shadow: 0 0 8px #f97316; }
        .slider-emerald::-webkit-slider-thumb { background: #10b981; box-shadow: 0 0 8px #10b981; }

        input[type=number]::-webkit-inner-spin-button { display: none; }
        .svg-line { vector-effect: non-scaling-stroke; stroke-linejoin: round; }
        .grid-line { stroke: #1e293b; stroke-width: 1px; vector-effect: non-scaling-stroke; stroke-dasharray: 2 4; }
        
        ::-webkit-scrollbar { width: 8px; }
        ::-webkit-scrollbar-track { background: #020617; }
        ::-webkit-scrollbar-thumb { background: #1e293b; border-radius: 10px; }
        ::-webkit-scrollbar-thumb:hover { background: #334155; }
    </style>
</head>
<body class="p-3 md:p-4 lg:p-5 min-h-screen md:h-screen md:overflow-visible flex flex-col">
    <div id="root" class="max-w-[1400px] mx-auto w-full flex flex-col gap-4 md:gap-4 pb-10 md:pb-12 lg:pb-12 overflow-visible"></div>

    <script type="text/babel">
        const { useState, useMemo } = React;

        const App = () => {
            const REF = { MIG: 250000, JUB: 67, FER: 1.16, SUELDO: 35000, EDAD: 35 };
            const [mig, setMig] = useState(REF.MIG);
            const [jub, setJub] = useState(REF.JUB);
            const [fer, setFer] = useState(REF.FER);
            const [sueldo, setSueldo] = useState(REF.SUELDO);
            const [edad, setEdad] = useState(REF.EDAD);

            const data = useMemo(() => {
                let pts = [];
                for (let i = 0; i <= 125; i++) {
                    const year = 2025 + i;
                    const peak = 30; 
                    const babyBoom = 5.5 * Math.exp(-Math.pow(i - peak, 2) / 400); 
                    const pensioners = 10.1 + babyBoom + (i * 0.01) - ((jub - 67) * 0.3);
                    const workers = Math.max(0, 21.2 + ((mig - 250000) / 100000) * (i / 10) * 0.8 + (i > 20 ? (fer - 1.16) * 1.5 * ((i - 20) / 10) : 0) + (jub - 67) * 0.5 - (i * 0.06));
                    const solv = Math.max(0, Math.min(120, ((workers / pensioners) / 2.1) * 100));
                    pts.push({ x: i, year, coti: workers, pens: pensioners, solv });
                }
                return pts;
            }, [mig, jub, fer]);

            const retX = Math.max(0, Math.min(125, jub - (parseInt(edad)||0))); 
            const userPt = data[retX];
            const pTeorica = ((parseInt(sueldo)||0) * 0.8) / 14;
            const pReal = pTeorica * (userPt.solv / 100);
            const deficit = pTeorica - pReal;

            // FUNCIONES DE ESCALADO DINÁMICO
            const getX = (v) => (v / 125) * 100;
            const maxPopulation = Math.max(40, ...data.map(d => d.coti), ...data.map(d => d.pens));
            const yMaxPop = Math.ceil(maxPopulation / 10) * 10; 
            const popGridLines = Array.from({length: (yMaxPop/10) + 1}, (_, i) => i * 10);
            const getPopY = (v) => 100 - (v / yMaxPop) * 100; 
            const getSolvY = (v) => 100 - (v / 120) * 100; 

            return (
                <React.Fragment>
                    {/* 1. HEADER */}
                    <header className="flex flex-col gap-3 border-b border-slate-800 pb-3 shrink-0">
                        <div className="flex flex-col md:flex-row justify-between items-start md:items-center gap-3">
                            <div>
                                <h1 className="text-2xl md:text-[2rem] font-black uppercase tracking-tight text-white leading-none">
                                    Simulador Actuarial <span className="text-blue-500">de Pensiones</span>
                                </h1>
                                <p className="text-sm font-semibold text-slate-400 mt-2">
                                    Arquitectura analítica creada por <a href="https://www.linkedin.com/in/oriol-badia" target="_blank" rel="noopener noreferrer" className="text-blue-400 hover:text-blue-300 hover:underline transition-colors">Oriol Badia Campanera</a>
                                </p>
                            </div>
                            <button onClick={() => {setMig(REF.MIG); setJub(REF.JUB); setFer(REF.FER); setSueldo(REF.SUELDO); setEdad(REF.EDAD);}} 
                                className="w-full md:w-auto text-[11px] font-bold uppercase tracking-widest text-slate-200 border border-slate-700 hover:bg-slate-800 px-4 py-2.5 rounded-lg transition-colors flex justify-center items-center gap-2 shadow-md">
                                <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2.5"><path d="M3 12a9 9 0 1 0 9-9 9.75 9.75 0 0 0-6.74 2.74L3 8"/><path d="M3 3v5h5"/></svg>
                                Reset Valores Reales (España Hoy)
                            </button>
                        </div>
                        <div className="bg-slate-900/50 p-3 md:p-4 rounded-xl border border-slate-800 shadow-inner">
                            <p className="text-xs text-slate-400 leading-relaxed">
                                <strong className="text-slate-200 uppercase tracking-widest text-[10px]">¿Para qué sirve este Dashboard?</strong><br/>
                                Este panel simula el futuro del sistema de pensiones de reparto en España. Un sistema de reparto significa que las pensiones de hoy se pagan con los impuestos de los trabajadores actuales. El problema radica en que la jubilación de la enorme generación del Baby Boom, sumada a la baja natalidad, rompe esta balanza matemática. Esta herramienta te permite actuar como "Ministro de Economía", ajustando las variables macroeconómicas para descubrir si es posible evitar el déficit y ver cómo impactará esto en el poder adquisitivo de <strong>tu propia pensión mensual</strong>.
                            </p>
                        </div>
                    </header>

                    {/* 2. CONTROLES Y RESULTADOS */}
                    <div className="grid grid-cols-1 md:grid-cols-12 gap-4 w-full shrink-0">
                        
                        {/* Macro Escenario (4 cols) */}
                        <div className="md:col-span-4 panel">
                            <div className="panel-header text-xs font-black text-slate-400 uppercase tracking-widest flex justify-between">
                                <span>Macro Escenario</span>
                                <span className="text-[10px] text-slate-500 italic font-normal mt-0.5 hidden sm:block">Palancas del Estado</span>
                            </div>
                            <div className="p-5 flex flex-col gap-6 h-full justify-center">
                                <div>
                                    <div className="flex justify-between items-end mb-2">
                                        <span className="text-xs font-bold text-slate-200 uppercase">Inmigración Neta</span>
                                        <span className="text-sm font-mono text-blue-400 font-bold">{Math.round(mig/1000)}k/año</span>
                                    </div>
                                    <input type="range" min="0" max="1500000" step="25000" value={mig} onChange={e=>setMig(Number(e.target.value))} className="slider-blue mb-2" />
                                    <p className="text-[10px] text-slate-500 leading-relaxed">
                                        <strong>¿Qué es?</strong> Flujo de habitantes extra anuales.<br/>
                                        <strong>Si lo modificas:</strong> Aumentar esta palanca infla rápidamente la curva azul de trabajadores. Es la vía más rápida para conseguir liquidez.
                                    </p>
                                </div>
                                <div>
                                    <div className="flex justify-between items-end mb-2">
                                        <span className="text-xs font-bold text-slate-200 uppercase">Edad Jubilación Legal</span>
                                        <span className="text-sm font-mono text-orange-400 font-bold">{jub} años</span>
                                    </div>
                                    <input type="range" min="60" max="85" step="1" value={jub} onChange={e=>setJub(Number(e.target.value))} className="slider-orange mb-2" />
                                    <p className="text-[10px] text-slate-500 leading-relaxed">
                                        <strong>¿Qué es?</strong> Año en que dejamos de aportar.<br/>
                                        <strong>Si lo modificas:</strong> Retrasarla frena la subida de la curva naranja y extiende la base azul. Es la medida financiera más efectiva.
                                    </p>
                                </div>
                                <div>
                                    <div className="flex justify-between items-end mb-2">
                                        <span className="text-xs font-bold text-slate-200 uppercase">Tasa de Fertilidad</span>
                                        <span className="text-sm font-mono text-emerald-400 font-bold">{fer} hijos</span>
                                    </div>
                                    <input type="range" min="0.5" max="4" step="0.1" value={fer} onChange={e=>setFer(Number(e.target.value))} className="slider-emerald mb-2" />
                                    <p className="text-[10px] text-slate-500 leading-relaxed">
                                        <strong>¿Qué es?</strong> Hijos por mujer en edad fértil.<br/>
                                        <strong>Si lo modificas:</strong> Modificarla hoy no salva el déficit inminente, pero asegura la supervivencia a partir de 2080.
                                    </p>
                                </div>
                            </div>
                        </div>

                        {/* Datos Personales (3 cols) */}
                        <div className="md:col-span-3 panel">
                            <div className="panel-header text-xs font-black text-slate-400 uppercase tracking-widest flex justify-between">
                                <span>Datos Personales</span>
                                <span className="text-[10px] text-slate-500 italic font-normal mt-0.5 hidden sm:block">Tu contexto</span>
                            </div>
                            <div className="p-5 flex flex-col gap-6 h-full justify-start mt-2">
                                <div>
                                    <label className="text-xs font-bold text-slate-200 uppercase block mb-2">Sueldo Bruto Anual</label>
                                    <div className="flex items-center gap-2 bg-slate-950 border border-slate-700 rounded-xl px-4 py-3 focus-within:border-blue-500 transition-colors mb-2">
                                        <span className="text-slate-500 font-bold text-base">€</span>
                                        <input type="number" value={sueldo} onChange={e=>setSueldo(e.target.value === '' ? '' : Number(e.target.value))} className="w-full font-mono text-lg font-bold text-white bg-transparent outline-none" />
                                    </div>
                                    <p className="text-xs text-slate-500 leading-relaxed">
                                        El sistema calcula que tu primera pensión será aprox. el 80% de este valor (tasa de reemplazo).
                                    </p>
                                </div>
                                <div className="mt-2">
                                    <label className="text-xs font-bold text-slate-200 uppercase block mb-2">Tu Edad Actual</label>
                                    <div className="flex items-center gap-2 bg-slate-950 border border-slate-700 rounded-xl px-4 py-3 focus-within:border-blue-500 transition-colors mb-2">
                                        <input type="number" value={edad} onChange={e=>setEdad(e.target.value === '' ? '' : Number(e.target.value))} className="w-full font-mono text-lg font-bold text-white bg-transparent outline-none text-right" />
                                        <span className="text-xs text-slate-500 font-bold uppercase">Años</span>
                                    </div>
                                    <p className="text-xs text-slate-500 leading-relaxed">
                                        Determina tu marcador en la línea temporal. Cruza tus datos con la solvencia futura.
                                    </p>
                                </div>
                            </div>
                        </div>

                        {/* Output Maestro (5 cols) */}
                        <div className="md:col-span-5 panel bg-gradient-to-br from-slate-900 to-[#020617] relative overflow-visible">
                            <div className="absolute top-0 right-0 p-4 opacity-5 pointer-events-none">
                                <svg width="150" height="150" viewBox="0 0 24 24" fill="currentColor"><path d="M12 2C6.48 2 2 6.48 2 12s4.48 10 10 10 10-4.48 10-10S17.52 2 12 2zm1 15h-2v-6h2v6zm0-8h-2V7h2v2z"/></svg>
                            </div>
                            <div className="panel-header bg-transparent border-slate-800 flex justify-between items-center pb-2">
                                <span className="text-xs font-black text-blue-500 uppercase tracking-widest">Auditoría Financiera Final</span>
                                <span className="text-[10px] font-mono font-bold text-emerald-400 bg-emerald-400/10 border border-emerald-400/20 px-3 py-1 rounded">AÑO {userPt.year}</span>
                            </div>
                            
                            <div className="p-5 flex flex-col justify-between h-full z-10 relative">
                                <div className="mb-4">
                                    <p className="text-xs font-bold text-slate-300 uppercase mb-2">Pensión Real Ajustada</p>
                                    <div className="flex items-baseline gap-2 mb-2">
                                        <span className="text-5xl md:text-6xl font-black font-mono tracking-tighter text-white drop-shadow-md">{Math.round(pReal).toLocaleString()}€</span>
                                        <span className="text-sm font-bold text-slate-500 uppercase">/mes</span>
                                    </div>
                                    <p className="text-[10px] md:text-xs text-slate-400 leading-relaxed mt-2 mb-4">
                                        Esta cifra representa la realidad matemática: Es lo que el sistema <strong>realmente podrá pagarte</strong> en poder adquisitivo constante basándose en el nivel de autofinanciación proyectado para tu año de jubilación.
                                    </p>
                                    
                                    <div className="grid grid-cols-2 gap-4 text-sm pt-4 border-t border-slate-800/80">
                                        <div>
                                            <span className="block text-[10px] font-black text-slate-500 uppercase tracking-widest mb-1">Promesa Legal Hoy</span>
                                            <span className="font-mono text-base font-bold text-slate-400 line-through block mb-1">{Math.round(pTeorica)}€</span>
                                            <span className="text-[10px] text-slate-500 leading-tight">Lo que el sistema te promete sobre el papel.</span>
                                        </div>
                                        <div>
                                            <span className="block text-[10px] font-black text-red-500/80 uppercase tracking-widest mb-1">Déficit Generado</span>
                                            <span className="font-mono text-base font-bold text-red-500 block mb-1">-{Math.round(deficit)}€</span>
                                            <span className="text-[10px] text-slate-500 leading-tight">Agujero contable. Es dinero que falta y se deberá suplir con deuda o recortes.</span>
                                        </div>
                                    </div>
                                </div>

                                {/* Factor Solvencia */}
                                <div className="bg-[#0f172a]/80 p-4 md:p-5 rounded-xl border border-slate-700 shadow-inner mt-2">
                                    <div className="flex justify-between items-end mb-3">
                                        <span className="text-xs font-bold text-slate-200 uppercase">Factor de Solvencia</span>
                                        <span className={`text-4xl font-black font-mono tracking-tighter ${userPt.solv >= 100 ? 'text-emerald-500' : 'text-red-500'}`}>
                                            {Math.round(userPt.solv)}%
                                        </span>
                                    </div>
                                    <div className="w-full h-3 bg-slate-950 rounded-full overflow-visible border border-slate-800 mb-3">
                                        <div className={`h-full transition-all duration-700 ${userPt.solv >= 100 ? 'bg-emerald-500 shadow-[0_0_10px_rgba(16,185,129,0.5)]' : 'bg-red-500 shadow-[0_0_10px_rgba(239,68,68,0.5)]'}`} style={{width: `${userPt.solv}%`}}></div>
                                    </div>
                                    <p className="text-[10px] md:text-xs text-slate-400 leading-relaxed">
                                        La métrica maestra que define tu futuro. Indica qué porcentaje de los gastos del sistema están cubiertos por los ingresos reales. Si está por debajo de 100%, el sistema no se autofinancia. 
                                    </p>
                                </div>
                            </div>
                        </div>
                    </div>

                    {/* 3. GRÁFICOS */}
                    <div className="grid grid-cols-1 lg:grid-cols-2 gap-4 flex-1 min-h-0 pb-4 md:pb-4">
                        
                        {/* Gráfico 1: Población */}
                        <div className="panel relative flex flex-col min-h-0 overflow-visible">
                            <div className="panel-header bg-slate-900/90 backdrop-blur-md border-b border-slate-800 shrink-0 z-10 p-3 md:p-4">
                                <div className="flex flex-col md:flex-row justify-between items-start md:items-center gap-3 md:gap-0">
                                    <div>
                                        <span className="block text-sm font-black text-slate-300 uppercase tracking-widest">Evolución Demográfica (M)</span>
                                        <span className="block text-[11px] text-slate-400 mt-1 font-medium max-w-md leading-relaxed">
                                            Visualiza el impacto estructural del <strong>Baby Boom</strong>. Observa cómo la curva naranja (jubilados) genera una "montaña" inasumible para la curva azul (cotizantes). Si ambas líneas se acercan, el sistema colapsa.
                                        </span>
                                    </div>
                                    <div className="flex gap-4 text-xs font-bold uppercase shrink-0">
                                        <span className="flex items-center gap-1.5 text-blue-400"><div className="w-3 h-3 rounded bg-blue-500 shadow-[0_0_5px_#3b82f6]"></div> Trabajadores</span>
                                        <span className="flex items-center gap-1.5 text-orange-400"><div className="w-3 h-3 rounded bg-orange-500 shadow-[0_0_5px_#f97316]"></div> Jubilados</span>
                                    </div>
                                </div>
                            </div>
                            
                            <div className="relative min-h-[300px] h-[300px] md:min-h-[360px] md:h-[360px] lg:min-h-[360px] lg:h-[360px] xl:min-h-[380px] xl:h-[380px] mt-4 mb-8 mx-4 overflow-visible">
                                {/* Eje Y HTML Dinámico */}
                                {popGridLines.map(v => (
                                    <span key={`y1-${v}`} className="absolute left-0 text-xs font-mono text-slate-500 -translate-y-1/2" style={{ top: `${getPopY(v)}%` }}>{v}M</span>
                                ))}
                                
                                <div className="absolute inset-0 left-10">
                                    <svg viewBox="0 0 100 100" className="w-full h-full overflow-visible" preserveAspectRatio="none">
                                        {popGridLines.map(v => <line key={`l1-${v}`} x1="0" y1={getPopY(v)} x2="100" y2={getPopY(v)} className="grid-line" />)}
                                        
                                        <path d={`M ${data.map(d => `${getX(d.x)},${getPopY(d.coti)}`).join(' L ')}`} fill="none" stroke="#3b82f6" strokeWidth="2.5" className="svg-line" />
                                        <path d={`M ${data.map(d => `${getX(d.x)},${getPopY(d.pens)}`).join(' L ')}`} fill="none" stroke="#f97316" strokeWidth="2.5" className="svg-line" />
                                        
                                        <line x1={getX(retX)} y1="0" x2={getX(retX)} y2="100" stroke="#10b981" strokeWidth="1.5" strokeDasharray="4 4" className="svg-line" />
                                    </svg>
                                    
                                    {/* PUNTOS HTML PERFECTOS */}
                                    <div className="absolute w-4 h-4 bg-blue-500 rounded-full border-2 border-[#0f172a] shadow-[0_0_8px_rgba(59,130,246,0.6)]" 
                                         style={{ left: `${getX(retX)}%`, top: `${getPopY(userPt.coti)}%`, transform: 'translate(-50%, -50%)', zIndex: 20 }}></div>
                                    <div className="absolute w-4 h-4 bg-orange-500 rounded-full border-2 border-[#0f172a] shadow-[0_0_8px_rgba(249,115,22,0.6)]" 
                                         style={{ left: `${getX(retX)}%`, top: `${getPopY(userPt.pens)}%`, transform: 'translate(-50%, -50%)', zIndex: 20 }}></div>
                                </div>
                                
                                {/* Eje X HTML */}
                                <div className="absolute top-full left-10 right-0 flex justify-between text-xs font-mono text-slate-500 mt-3">
                                    <span>2025</span><span>2055</span><span>2085</span><span>2115</span><span>2150</span>
                                </div>
                            </div>
                        </div>

                        {/* Gráfico 2: Solvencia */}
                        <div className="panel relative flex flex-col min-h-0 overflow-visible">
                            <div className="panel-header bg-slate-900/90 backdrop-blur-md border-b border-slate-800 shrink-0 z-10 p-3 md:p-4">
                                <div className="flex flex-col md:flex-row justify-between items-start md:items-center gap-3 md:gap-0">
                                    <div>
                                        <span className="block text-sm font-black text-slate-300 uppercase tracking-widest">Ratio de Autofinanciación (%)</span>
                                        <span className="block text-[11px] text-slate-400 mt-1 font-medium max-w-md leading-relaxed">
                                            Es el resultado directo del gráfico demográfico. Muestra el estado de la "caja fuerte". <strong>Cualquier área sombreada por debajo de la línea verde representa un déficit puro</strong>, momento en el cual el Estado tiene que emitir deuda para pagarte.
                                        </span>
                                    </div>
                                    <span className="text-xs font-mono font-bold text-emerald-500 bg-emerald-500/10 px-3 py-1.5 rounded shrink-0 border border-emerald-500/30 shadow-[0_0_10px_rgba(16,185,129,0.2)]">EQUILIBRIO (100%)</span>
                                </div>
                            </div>
                            
                            <div className="relative min-h-[300px] h-[300px] md:min-h-[360px] md:h-[360px] lg:min-h-[360px] lg:h-[360px] xl:min-h-[380px] xl:h-[380px] mt-4 mb-8 mx-4 overflow-visible">
                                {/* Eje Y HTML */}
                                {[0, 25, 50, 75, 100, 120].map(v => (
                                    <span key={`y2-${v}`} className="absolute left-0 text-xs font-mono text-slate-500 -translate-y-1/2" style={{ top: `${getSolvY(v)}%` }}>{v}%</span>
                                ))}
                                
                                <div className="absolute inset-0 left-10">
                                    <svg viewBox="0 0 100 100" className="w-full h-full overflow-visible" preserveAspectRatio="none">
                                        <defs>
                                            <linearGradient id="solvGrad" x1="0" y1="0" x2="0" y2="1">
                                                <stop offset="0%" stopColor="#3b82f6" stopOpacity="0.4" />
                                                <stop offset="100%" stopColor="#3b82f6" stopOpacity="0" />
                                            </linearGradient>
                                        </defs>
                                        
                                        {[0, 25, 50, 75, 100, 120].map(v => <line key={`l2-${v}`} x1="0" y1={getSolvY(v)} x2="100" y2={getSolvY(v)} className="grid-line" />)}
                                        <line x1="0" y1={getSolvY(100)} x2="100" y2={getSolvY(100)} stroke="#10b981" strokeWidth="2" strokeDasharray="4 4" className="svg-line" />
                                        
                                        <path d={`M 0,100 L ${data.map(d => `${getX(d.x)},${getSolvY(d.solv)}`).join(' L ')} L 100,100 Z`} fill="url(#solvGrad)" />
                                        <path d={`M ${data.map(d => `${getX(d.x)},${getSolvY(d.solv)}`).join(' L ')}`} fill="none" stroke="#3b82f6" strokeWidth="3" className="svg-line" />
                                        
                                        <line x1={getX(retX)} y1="0" x2={getX(retX)} y2="100" stroke="#10b981" strokeWidth="1.5" strokeDasharray="4 4" className="svg-line" />
                                    </svg>

                                    {/* PUNTO HTML PERFECTO */}
                                    <div className="absolute w-5 h-5 bg-white rounded-full border-[3px] border-blue-500 shadow-[0_0_12px_rgba(255,255,255,0.8)]" 
                                         style={{ left: `${getX(retX)}%`, top: `${getSolvY(userPt.solv)}%`, transform: 'translate(-50%, -50%)', zIndex: 20 }}></div>
                                </div>
                                
                                {/* Eje X HTML */}
                                <div className="absolute top-full left-10 right-0 flex justify-between text-xs font-mono text-slate-500 mt-3">
                                    <span>2025</span><span>2055</span><span>2085</span><span>2115</span><span>2150</span>
                                </div>
                            </div>
                        </div>

                    </div>
                </React.Fragment>
            );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
